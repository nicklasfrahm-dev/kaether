{{define "content"}}
<div>
    <div class="mb-6">
        <h1 class="text-xl font-bold text-white">Settings</h1>
        <p class="mt-1 text-sm text-neutral-500">Server configuration for this kontinuum instance.</p>
    </div>

    <div class="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden">
        <div class="px-6 py-3 border-b border-neutral-800">
            <h2 class="text-sm font-bold text-white uppercase tracking-wider">Server</h2>
        </div>
        <dl class="divide-y divide-neutral-800">
            <div class="px-6 py-3 flex items-center justify-between gap-4">
                <dt class="text-sm text-neutral-500">Version</dt>
                <dd class="text-sm font-medium text-white">{{.Version}}</dd>
            </div>
            <div class="px-6 py-3 flex items-center justify-between gap-4">
                <dt class="text-sm text-neutral-500">Listen address</dt>
                <dd class="text-sm font-medium text-white">{{.Addr}}</dd>
            </div>
            <div class="px-6 py-3 flex items-center justify-between gap-4">
                <dt class="text-sm text-neutral-500">Storage backend</dt>
                <dd class="text-sm font-medium text-white">{{.StorageBackend}}</dd>
            </div>
            <div class="px-6 py-3 flex items-center justify-between gap-4">
                <dt class="text-sm text-neutral-500">Storage target</dt>
                <dd class="text-sm font-medium text-white break-all text-right">{{.StorageTarget}}</dd>
            </div>
            <div class="px-6 py-3 flex items-center justify-between gap-4">
                <dt class="text-sm text-neutral-500">Log level</dt>
                <dd class="text-sm font-medium text-white">{{.LogLevel}}</dd>
            </div>
            <div class="px-6 py-3 flex items-center justify-between gap-4">
                <dt class="text-sm text-neutral-500">Log format</dt>
                <dd class="text-sm font-medium text-white">{{.LogFormat}}</dd>
            </div>
        </dl>
    </div>
</div>
{{end}}
